# Fraser Health Authority — 30-Day Autonomous PMO Simulation
# Organization: Fraser Health Authority, British Columbia, Canada
# Scope: Digital Health & Clinical Systems Transformation Portfolio
# Simulation period: Day 1–30 (simulates February 2026, fiscal Q4)
#
# Fraser Health is BC's largest health authority, serving 1.9M people
# across 12 acute care hospitals, 8,500+ staff.
#
# This scenario exercises the PMO platform across all 4 user tiers:
#   - Project Coordinator (Sarah Chen, Digital Health)
#   - Project Manager (Raj Patel, Clinical Systems)
#   - Senior Project Manager (Dr. Linda Morrison, Infrastructure)
#   - Director of Project Management (Michael Okafor, Digital Transformation Office)
#
# Regulation context: BC FOIPPA, Canadian Patient Data Protection Act,
#                    Health Canada Digital Health Standards
#
# 15 projects · 5 clinical teams · 180 tasks · 14 milestones
# Injected failures: 4 dependency cascades, 2 capacity overloads,
#                   3 silent compliance signals, 2 critical patient-safety blockers,
#                   1 late-surfacing vendor failure

name: fraser_health_30day
description: >
  Fraser Health Authority 30-day Digital Transformation portfolio simulation.
  Models realistic BC public sector healthcare IT delivery with patient safety
  constraints, FOIPPA compliance requirements, cross-team resource contention,
  and vendor dependency risks across 5 clinical IT teams.
version: "1.0"
duration_days: 30
fast_ci: false
max_runtime_seconds: 300

tenant_id: fraser_health
organization: Fraser Health Authority
jurisdiction: British Columbia, Canada
portfolio: Digital Health Transformation Q4-FY2026

# ---- User Personas ----
# These personas represent the four access tiers. The PMO platform
# must serve each with appropriately scoped context and decision briefs.
user_personas:
  - id: user_sarah_chen
    name: Sarah Chen
    role: project_coordinator
    team: team_digital_health
    projects: [proj_fh_001, proj_fh_002]
    typical_interactions:
      - task_status_updates
      - blocker_escalation
      - progress_reporting
    rbac_role: team_member

  - id: user_raj_patel
    name: Raj Patel
    role: project_manager
    team: team_clinical_systems
    projects: [proj_fh_003, proj_fh_004, proj_fh_005]
    typical_interactions:
      - risk_review_and_approval
      - resource_reallocation_requests
      - decision_preparation_review
    rbac_role: project_manager

  - id: user_dr_morrison
    name: Dr. Linda Morrison
    role: senior_project_manager
    team: team_infrastructure
    projects: [proj_fh_006, proj_fh_007, proj_fh_008, proj_fh_009]
    typical_interactions:
      - cross_project_dependency_arbitration
      - escalation_approval
      - milestone_scope_decisions
    rbac_role: senior_pm

  - id: user_michael_okafor
    name: Michael Okafor
    role: director_project_management
    team: team_program_office
    projects: [all]
    typical_interactions:
      - portfolio_health_review
      - executive_brief_approval
      - vendor_issue_escalation
      - compliance_decision_review
    rbac_role: program_director

# ---- Clinical IT Teams ----
teams:
  - id: team_digital_health
    name: Digital Health Integration Team
    capacity: 6
    skills: [hl7_fhir, patient_data_integration, api_development, interoperability]
    lead: sarah_chen
    budget_remaining_cad: 280000

  - id: team_clinical_systems
    name: Clinical Systems Team
    capacity: 8
    skills: [epic_ehr, pharmacy_systems, clinical_decision_support, database]
    lead: raj_patel
    budget_remaining_cad: 620000

  - id: team_infrastructure
    name: Healthcare Infrastructure Team
    capacity: 7
    skills: [network, security, cloud_migration, hipaa_controls, endpoint_mgmt]
    lead: dr_morrison
    budget_remaining_cad: 890000

  - id: team_data_analytics
    name: Health Data & Analytics Team
    capacity: 5
    skills: [health_data_warehouse, powerbi, population_health, bc_cancer_reporting]
    lead: priya_nair
    budget_remaining_cad: 175000

  - id: team_program_office
    name: Digital Transformation Program Office
    capacity: 4
    skills: [portfolio_management, vendor_management, foippa_compliance, change_management]
    lead: michael_okafor
    budget_remaining_cad: 95000

# ---- Projects (15) ----
projects:
  # --- Digital Health Integration ---
  - id: proj_fh_001
    name: FHIR R4 Patient Record API
    description: >
      Expose Fraser Health patient records via HL7 FHIR R4 standard.
      Required by BC Ministry of Health mandate by March 31, 2026.
      All downstream patient portal and mobile apps depend on this API.
    team: team_digital_health
    task_count: 14
    milestones: [ms_fh_001_a, ms_fh_001_b]
    schedule_health: 0.71
    open_blockers: 2
    dependencies: []
    regulatory_mandate: true
    mandate_deadline_day: 30
    budget_cad: 180000
    risk_flags: [patient_data_exposure, bcfoippa_scope]

  - id: proj_fh_002
    name: Patient Portal — MyHealth FH
    description: >
      Patient-facing web and mobile portal. Integration with FHIR API (proj_fh_001),
      BC Services Card authentication, and pharmacy refill via PharmaNet.
    team: team_digital_health
    task_count: 16
    milestones: [ms_fh_002_a, ms_fh_002_b]
    schedule_health: 0.58
    open_blockers: 3
    dependencies: [proj_fh_001, proj_fh_010]
    budget_cad: 250000

  # --- Clinical Systems ---
  - id: proj_fh_003
    name: Epic EHR Phase 3 — Pharmacy Integration
    description: >
      Epic EHR upgrade to enable bidirectional pharmacy workflow with PharmaNet BC.
      Patient safety critical. Requires Health Canada approval for medication alerts.
    team: team_clinical_systems
    task_count: 18
    milestones: [ms_fh_003_a, ms_fh_003_b, ms_fh_003_c]
    schedule_health: 0.64
    open_blockers: 2
    dependencies: []
    patient_safety: true
    budget_cad: 490000

  - id: proj_fh_004
    name: Clinical Decision Support — Sepsis Alerts
    description: >
      AI-assisted sepsis early warning integrated into Epic EHR nurse workstations.
      Requires validation study completion and physician champion sign-off before go-live.
    team: team_clinical_systems
    task_count: 12
    milestones: [ms_fh_004_a]
    schedule_health: 0.82
    open_blockers: 0
    dependencies: [proj_fh_003]
    patient_safety: true
    budget_cad: 310000

  - id: proj_fh_005
    name: Diagnostic Imaging — PACS Upgrade
    description: >
      Picture Archiving and Communications System upgrade across 5 acute sites.
      Vendor: Sectra AB (Sweden). Contract clause: all upgrades within fiscal year.
    team: team_clinical_systems
    task_count: 11
    milestones: [ms_fh_005_a, ms_fh_005_b]
    schedule_health: 0.49
    open_blockers: 4
    dependencies: []
    vendor: Sectra_AB
    budget_cad: 720000

  # --- Infrastructure ---
  - id: proj_fh_006
    name: Azure Cloud Migration — Clinical Workloads
    description: >
      Migrate 40 clinical application servers from on-premise Surrey Memorial
      data centre to Azure Canada East (Toronto). FOIPPA requires data residency
      in Canada. Health authority board approved in January 2026.
    team: team_infrastructure
    task_count: 22
    milestones: [ms_fh_006_a, ms_fh_006_b]
    schedule_health: 0.67
    open_blockers: 3
    dependencies: [proj_fh_010]
    foippa_compliant: true
    budget_cad: 1100000

  - id: proj_fh_007
    name: Zero Trust Network Refresh — Abbotsford Regional
    description: >
      Network segmentation and Zero Trust architecture rollout at Abbotsford
      Regional Hospital. Required following 2025 Medibank-style threat assessment
      commissioned by BC Ministry of Health.
    team: team_infrastructure
    task_count: 14
    milestones: [ms_fh_007_a]
    schedule_health: 0.75
    open_blockers: 1
    dependencies: []
    security_critical: true
    budget_cad: 680000

  - id: proj_fh_008
    name: Telehealth Platform — Virtual Care Expansion
    description: >
      Expand BC Virtual Care (powered by Zoom Healthcare HIPAA) to 8 additional
      Fraser Health clinics. Requires clinical workflow redesign and staff training.
    team: team_infrastructure
    task_count: 10
    milestones: [ms_fh_008_a]
    schedule_health: 0.88
    open_blockers: 0
    dependencies: [proj_fh_010]
    budget_cad: 195000

  - id: proj_fh_009
    name: Medical Device Connectivity — Langley Memorial
    description: >
      Connect 200 bedside monitoring devices (Philips) to central clinical data
      repository at Langley Memorial Hospital. Philips HL7v2 adapter required.
    team: team_infrastructure
    task_count: 9
    milestones: [ms_fh_009_a]
    schedule_health: 0.72
    open_blockers: 1
    dependencies: [proj_fh_001]
    vendor: Philips_Healthcare
    budget_cad: 340000

  # --- Data & Analytics ---
  - id: proj_fh_010
    name: Health Data Platform — Foundation Layer
    description: >
      Azure-based health data lakehouse. Feeds population health dashboards,
      cancer screening analytics, and COVID/respiratory surveillance.
      Blocks 4 downstream projects. Teams depend on this for dev environments.
    team: team_data_analytics
    task_count: 16
    milestones: [ms_fh_010_a, ms_fh_010_b]
    schedule_health: 0.61
    open_blockers: 3
    dependencies: []
    budget_cad: 430000

  - id: proj_fh_011
    name: Population Health Dashboard — BC Cancer Integration
    description: >
      Real-time cancer screening rates dashboard for Fraser Health Medical Officers.
      Integrates BC Cancer Registry API (quarterly data feed).
    team: team_data_analytics
    task_count: 8
    milestones: [ms_fh_011_a]
    schedule_health: 0.79
    open_blockers: 0
    dependencies: [proj_fh_010]
    budget_cad: 145000

  - id: proj_fh_012
    name: Respiratory Illness Surveillance System
    description: >
      Near-real-time ED and GP visit data aggregation for respiratory illness
      surveillance. Feeds BC CDC dashboard. Weekly reporting deadline to BCCDC.
    team: team_data_analytics
    task_count: 7
    milestones: [ms_fh_012_a]
    schedule_health: 0.84
    open_blockers: 0
    dependencies: [proj_fh_010]
    budget_cad: 110000

  # --- Program Office ---
  - id: proj_fh_013
    name: FOIPPA Compliance Audit — EHR Data Flows
    description: >
      Mandated FOIPPA privacy audit of all EHR data flows. Must be complete
      by March 15, 2026 to satisfy BC Privacy Commissioner request.
      Findings feed directly into proj_fh_003 and proj_fh_006 governance.
    team: team_program_office
    task_count: 9
    milestones: [ms_fh_013_a]
    schedule_health: 0.55
    open_blockers: 2
    dependencies: [proj_fh_003, proj_fh_006]
    regulatory_mandate: true
    mandate_deadline_day: 15
    budget_cad: 85000

  - id: proj_fh_014
    name: Vendor Performance Review — Epic & Sectra
    description: >
      Annual SLA review for Epic Systems and Sectra AB contracts.
      Contract renewal decisions due by February 28, 2026.
    team: team_program_office
    task_count: 6
    milestones: [ms_fh_014_a]
    schedule_health: 0.90
    open_blockers: 0
    dependencies: []
    budget_cad: 30000

  - id: proj_fh_015
    name: Staff Digital Literacy Training — Wave 2
    description: >
      Required training for 1,200 clinical staff on Epic EHR Phase 3 workflows.
      Must precede proj_fh_003 go-live. Contracted to Fraser Health Learning Institute.
    team: team_program_office
    task_count: 8
    milestones: [ms_fh_015_a, ms_fh_015_b]
    schedule_health: 0.76
    open_blockers: 1
    dependencies: [proj_fh_003]
    budget_cad: 120000

# ---- Milestones (14) ----
milestones:
  - id: ms_fh_001_a
    project_id: proj_fh_001
    name: FHIR R4 API — Internal Sandbox Complete
    due_days_from_start: 10
    status: at_risk
    risk_reason: >
      PharmaNet credential setup delayed — BC Ministry of Health ticket pending.
      Two development blockers open for 5+ days without response.

  - id: ms_fh_001_b
    project_id: proj_fh_001
    name: FHIR R4 API — Production Go-Live (Mandate Deadline)
    due_days_from_start: 28
    status: at_risk
    risk_reason: >
      Mandate deadline March 31 aligns with day 30 of simulation.
      Sandbox delays put production go-live at risk.

  - id: ms_fh_002_a
    project_id: proj_fh_002
    name: MyHealth FH — Beta Launch (Staff Testing)
    due_days_from_start: 16
    status: at_risk
    risk_reason: Blocked on FHIR API (proj_fh_001) sandbox completion.

  - id: ms_fh_002_b
    project_id: proj_fh_002
    name: MyHealth FH — Patient-Facing Launch
    due_days_from_start: 29
    status: on_track

  - id: ms_fh_003_a
    project_id: proj_fh_003
    name: Epic Pharmacy Integration — Dev Complete
    due_days_from_start: 8
    status: at_risk
    risk_reason: PharmaNet BC API rate limit issue unresolved. Vendor ticket escalated.

  - id: ms_fh_003_b
    project_id: proj_fh_003
    name: Epic Pharmacy Integration — UAT Sign-off
    due_days_from_start: 20
    status: on_track

  - id: ms_fh_003_c
    project_id: proj_fh_003
    name: Epic Pharmacy Integration — Clinical Go-Live
    due_days_from_start: 28
    status: on_track

  - id: ms_fh_005_a
    project_id: proj_fh_005
    name: PACS Upgrade — Surrey Memorial & Burnaby General
    due_days_from_start: 12
    status: delayed
    risk_reason: >
      Sectra AB remote engineer travel visa delayed. On-site installation
      required for hardware replacement. Cannot proceed remotely.

  - id: ms_fh_005_b
    project_id: proj_fh_005
    name: PACS Upgrade — Remaining 3 Sites
    due_days_from_start: 26
    status: at_risk
    risk_reason: Cascade from ms_fh_005_a delay.

  - id: ms_fh_006_a
    project_id: proj_fh_006
    name: Azure Migration — Wave 1 (Non-Clinical Workloads)
    due_days_from_start: 14
    status: at_risk
    risk_reason: Health Data Platform (proj_fh_010) dev environment not ready.

  - id: ms_fh_010_a
    project_id: proj_fh_010
    name: Health Data Platform — Dev Environment Ready
    due_days_from_start: 7
    status: delayed
    risk_reason: >
      Azure subscription quota increase request pending. 3 projects blocked
      (proj_fh_002, proj_fh_006, proj_fh_008) on this milestone.

  - id: ms_fh_010_b
    project_id: proj_fh_010
    name: Health Data Platform — Production Ingestion Live
    due_days_from_start: 22
    status: on_track

  - id: ms_fh_013_a
    project_id: proj_fh_013
    name: FOIPPA Audit — Findings Report to BC Privacy Commissioner
    due_days_from_start: 15
    status: at_risk
    risk_reason: >
      Two EHR data flow diagrams missing from audit package.
      Team waiting on proj_fh_003 technical lead for documentation.
      Hard regulatory deadline — no extension available.

  - id: ms_fh_014_a
    project_id: proj_fh_014
    name: Vendor Contract Renewal Decision — Epic & Sectra
    due_days_from_start: 28
    status: on_track

# ---- Simulated Usage Events (30-Day Timeline) ----
# Maps to the user_personas above. Each event represents a platform interaction.
# This section feeds the data seeder to generate realistic evaluation data.
usage_timeline:

  # WEEK 1 — Days 1–7

  - day: 1
    user: user_sarah_chen
    action: task_status_check
    project: proj_fh_001
    event_type: task.updated
    context: >
      Sarah reviews morning status — PharmaNet credential task still blocked.
      No update from Ministry of Health in 3 days. Flags for Raj.

  - day: 1
    user: user_raj_patel
    action: risk_review
    project: proj_fh_003
    event_type: risk.detected
    context: >
      Raj reviews Epic pharmacy integration — PharmaNet BC rate limit issue
      affects both proj_fh_001 and proj_fh_003. Single point of failure.

  - day: 2
    user: user_dr_morrison
    action: dependency_review
    project: proj_fh_006
    event_type: dependency.blocked
    context: >
      Linda discovers proj_fh_006 (Azure migration) cannot start Wave 1
      until Health Data Platform (proj_fh_010) dev environment is ready.
      Day 7 milestone at risk. Escalates to Michael.

  - day: 2
    user: user_michael_okafor
    action: portfolio_review
    project: all
    event_type: milestone.updated
    context: >
      Michael reviews portfolio dashboard. 6 of 15 projects show at_risk
      or delayed milestones. Requests decision prep briefs for top 3 risks.

  - day: 3
    user: user_sarah_chen
    action: blocker_escalation
    project: proj_fh_001
    event_type: dependency.blocked
    context: >
      Sarah formally escalates PharmaNet credential blocker.
      FHIR API sandbox milestone (Day 10) now at serious risk.
      Ministry of Health has not responded in 4 business days.

  - day: 3
    user: user_raj_patel
    action: vendor_issue
    project: proj_fh_005
    event_type: dependency.blocked
    context: >
      Raj escalates Sectra AB visa issue — PACS upgrade hardware installation
      cannot proceed. Vendor SLA breach risk. Surrey Memorial and Burnaby
      General sites blocked for 8+ days.

  - day: 4
    user: user_dr_morrison
    action: capacity_review
    project: proj_fh_006
    event_type: task.updated
    context: >
      Linda discovers team_infrastructure is at 140% capacity.
      Azure migration (proj_fh_006) and Zero Trust (proj_fh_007) both
      require network engineers simultaneously from Day 5–12.

  - day: 5
    user: user_michael_okafor
    action: executive_brief_review
    project: proj_fh_005
    event_type: milestone.updated
    context: >
      Michael receives Communication Agent brief on PACS delay.
      Approves escalation to Sectra AB account manager.
      Sets 48-hour response SLA.

  - day: 6
    user: user_sarah_chen
    action: task_update
    project: proj_fh_002
    event_type: task.updated
    context: >
      Sarah updates MyHealth FH portal tasks — BC Services Card
      authentication integration complete. FHIR API dependency still pending.

  - day: 7
    user: user_raj_patel
    action: foippa_flag
    project: proj_fh_013
    event_type: risk.detected
    context: >
      Raj flags missing EHR data flow diagrams for FOIPPA audit.
      Regulatory deadline Day 15. Documentation from Epic integration
      team not yet available. 8 days to hard deadline.

  # WEEK 2 — Days 8–14

  - day: 8
    user: user_dr_morrison
    action: capacity_arbitration
    project: proj_fh_007
    event_type: dependency.blocked
    context: >
      Linda must decide: pause Zero Trust network refresh (proj_fh_007)
      to free network engineers for Azure migration (proj_fh_006)?
      Both projects have firm commitments. Requests Program Director arbitration.

  - day: 8
    user: user_michael_okafor
    action: scope_review
    project: proj_fh_004
    event_type: risk.detected
    context: >
      Michael reviews sepsis alert project — physician champion (Dr. Tan)
      submitted 3 new alert criteria requirements not in original scope.
      No formal change request. Silent scope creep signal with low confidence.

  - day: 9
    user: user_sarah_chen
    action: status_report
    project: proj_fh_001
    event_type: milestone.updated
    context: >
      Sarah prepares weekly status report. FHIR API Day-10 milestone
      will be missed. PharmaNet credentials still pending.
      Forecasts 5-day delay.

  - day: 10
    user: user_raj_patel
    action: go_nogo_decision
    project: proj_fh_003
    event_type: milestone.updated
    context: >
      Epic pharmacy integration dev complete milestone reached — BUT
      PharmaNet rate limit workaround not approved by Health Canada.
      Raj requests go/no-go decision from medical leadership.

  - day: 11
    user: user_dr_morrison
    action: azure_quota_resolution
    project: proj_fh_010
    event_type: task.updated
    context: >
      Linda confirms Azure subscription quota increase approved (4 days late).
      Health Data Platform dev environment ready. Unblocks proj_fh_002,
      proj_fh_006, and proj_fh_008.

  - day: 12
    user: user_michael_okafor
    action: vendor_escalation
    project: proj_fh_005
    event_type: dependency.blocked
    context: >
      Sectra AB responds: engineer visa now approved, earliest arrival Day 16.
      PACS Surrey Memorial milestone moved from Day 12 to Day 18.
      Michael formally notifies hospital COO.

  - day: 13
    user: user_sarah_chen
    action: integration_test
    project: proj_fh_001
    event_type: task.updated
    context: >
      FHIR API team completes internal integration test with PharmaNet sandbox.
      PharmaNet production credentials received Day 12 (Ministry unblocked).
      Sandbox milestone achieved 3 days late.

  - day: 14
    user: user_raj_patel
    action: training_delay
    project: proj_fh_015
    event_type: risk.detected
    context: >
      Staff training Wave 2 enrollment 40% below target. Clinical staff
      released by ward managers at lower rate than plan assumed.
      Threatens proj_fh_003 go-live (Day 28).

  # WEEK 3 — Days 15–21

  - day: 15
    user: user_dr_morrison
    action: foippa_submission
    project: proj_fh_013
    event_type: milestone.updated
    context: >
      FOIPPA audit report submitted to BC Privacy Commissioner on deadline.
      Two data flow diagrams added at last minute by Raj's team.
      Milestone met — but 3 minor findings require remediation by Day 28.

  - day: 15
    user: user_michael_okafor
    action: compliance_review
    project: proj_fh_013
    event_type: risk.detected
    context: >
      Michael reviews FOIPPA audit findings. Finding 2 affects proj_fh_003:
      patient medication consent flow needs redesign before Epic go-live.
      This is a patient safety and legal compliance issue.

  - day: 16
    user: user_raj_patel
    action: sectra_arrival
    project: proj_fh_005
    event_type: task.updated
    context: >
      Sectra AB engineer arrives. PACS installation at Surrey Memorial begins.
      Estimated 3 days per site. Remaining 4 days of slack in schedule.

  - day: 17
    user: user_sarah_chen
    action: portal_beta
    project: proj_fh_002
    event_type: milestone.updated
    context: >
      MyHealth FH portal beta launch for staff testing — 1 day late but
      within acceptable variance. 47 staff testers enrolled.

  - day: 18
    user: user_dr_morrison
    action: zero_trust_restart
    project: proj_fh_007
    event_type: task.updated
    context: >
      Azure migration Wave 1 complete. Linda restarts Zero Trust network
      refresh at Abbotsford. Network engineers redeployed from proj_fh_006.

  - day: 19
    user: user_michael_okafor
    action: portfolio_health_review
    project: all
    event_type: task.updated
    context: >
      Mid-month portfolio review. 3 projects still at risk.
      FOIPPA Finding 2 remediation creates new risk for Epic go-live.
      Michael requests updated risk register from all PMs.

  - day: 20
    user: user_raj_patel
    action: epic_uat
    project: proj_fh_003
    event_type: milestone.updated
    context: >
      Epic pharmacy UAT begins with 8 clinical pharmacists.
      FOIPPA Finding 2 consent redesign complete — approved by medical ethics board.
      UAT on track.

  - day: 21
    user: user_sarah_chen
    action: device_connectivity_support
    project: proj_fh_009
    event_type: dependency.blocked
    context: >
      Philips HL7v2 adapter requires FHIR API (proj_fh_001) production endpoint.
      FHIR production endpoint not yet live. Device connectivity blocked.

  # WEEK 4 — Days 22–30

  - day: 22
    user: user_dr_morrison
    action: cloud_wave2_start
    project: proj_fh_006
    event_type: milestone.updated
    context: >
      Azure Migration Wave 2 (clinical workloads) begins.
      Health Data Platform production ingestion live (milestone met).
      Linda approves clinical workload migration schedule.

  - day: 23
    user: user_raj_patel
    action: pacs_completion
    project: proj_fh_005
    event_type: milestone.updated
    context: >
      PACS upgrade complete at Surrey Memorial and Burnaby General.
      Sectra engineer proceeds to Chilliwack General.
      Remaining 3 sites on track for Day 26.

  - day: 24
    user: user_michael_okafor
    action: vendor_renewal
    project: proj_fh_014
    event_type: milestone.updated
    context: >
      Vendor performance review complete. Epic contract renewal recommended
      with 3 performance improvement clauses. Sectra AB contract on hold
      pending formal SLA breach assessment for visa delay.

  - day: 25
    user: user_sarah_chen
    action: fhir_production
    project: proj_fh_001
    event_type: milestone.updated
    context: >
      FHIR R4 API production endpoint live — 3 days ahead of mandate deadline.
      Patient Portal and Device Connectivity now unblocked.
      Sarah closes 5 tasks and escalates final security review.

  - day: 26
    user: user_raj_patel
    action: training_shortfall
    project: proj_fh_015
    event_type: risk.detected
    context: >
      Training completion at 65% — target was 85% before Epic go-live.
      Raj escalates: proceed with go-live at 65% completion or delay?
      Patient safety concern: untrained staff may misuse medication alert workflows.

  - day: 26
    user: user_dr_morrison
    action: capacity_warning
    project: proj_fh_006
    event_type: task.updated
    context: >
      team_infrastructure approaching end-of-sprint capacity.
      Azure Migration Wave 2 + Zero Trust final testing overlapping.
      Risk: quality testing shortcuts under time pressure.

  - day: 27
    user: user_michael_okafor
